name: Engine Tests (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-cpp:
    runs-on: windows-latest
    steps:
      - name: Install winlibs
        uses: bwoodsend/setup-winlibs-action@v1
        with:
          with_clang: true

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $vcpkgDir = "$env:LOCALAPPDATA/vcpkg"
          if (!(Test-Path $vcpkgDir)) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgDir
            & "$vcpkgDir/bootstrap-vcpkg.bat"
          }
          echo "VCPKG_ROOT=$vcpkgDir" >> $env:GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile C++ Engine
        shell: pwsh
        run: |
          cmake -S engines/cpp -B engines/cpp/build --preset vcpkg-ninja
          cmake --build engines/cpp/build

      - name: Upload Engine Binary
        uses: actions/upload-artifact@v4
        with:
          name: cpp-engine-binary
          # Matches your preset's binaryDir: ${sourceDir}/build
          path: engines/cpp/build/main.exe
          retention-days: 1

  run-tests:
    needs: build-cpp
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Engine Binary
        uses: actions/download-artifact@v4
        with:
          name: cpp-engine-binary
          path: engines/cpp/build

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
          cache-dependency-path: engines/js/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install
        working-directory: engines/js

      - name: Run Python Integration Tests
        shell: pwsh
        run: >
          uvx 
          --with pytest 
          --with pytest-rich 
          --with pytest-github-actions-annotate-failures 
          pytest tests/test.py --rich